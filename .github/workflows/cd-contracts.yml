name: CD – Deploy Smart Contract

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/cd-contracts.yml"
  workflow_dispatch:
    inputs:
      network:
        description: "Target network (testnet)"
        required: true
        default: "testnet"
        type: choice
        options:
          - testnet

concurrency:
  group: cd-contracts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. Build the optimised WASM
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/chit-fund

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable with WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32v1-none

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/chit-fund/target
          key: ${{ runner.os }}-cargo-cd-${{ hashFiles('contracts/chit-fund/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cd-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Build optimised WASM
        run: stellar contract build

      - name: Upload WASM
        uses: actions/upload-artifact@v4
        with:
          name: chit-fund-wasm
          path: contracts/chit-fund/target/wasm32v1-none/release/chit_fund.wasm

  # ────────────────────────────────────────────────────────────────
  # 2. Deploy to Testnet (on push to main or manual trigger)
  # ────────────────────────────────────────────────────────────────
  deploy-testnet:
    name: Deploy → Testnet
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.network == 'testnet')
    environment:
      name: testnet
      url: https://stellar.expert/explorer/testnet

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable with WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32v1-none

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Download WASM artefact
        uses: actions/download-artifact@v4
        with:
          name: chit-fund-wasm
          path: wasm-out/

      - name: Configure Stellar CLI – testnet identity
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_TESTNET_SECRET_KEY }}
        run: |
          stellar keys add deployer --secret-key "$STELLAR_SECRET_KEY"
          stellar network add testnet \
            --rpc-url https://soroban-testnet.stellar.org \
            --network-passphrase "Test SDF Network ; September 2015"

      - name: Upload contract WASM to testnet
        id: upload
        run: |
          WASM_HASH=$(stellar contract upload \
            --wasm wasm-out/chit_fund.wasm \
            --source deployer \
            --network testnet)
          echo "wasm_hash=$WASM_HASH" >> "$GITHUB_OUTPUT"
          echo "✅ WASM hash: $WASM_HASH"

      - name: Deploy (or upgrade) contract on testnet
        id: deploy
        env:
          WASM_HASH: ${{ steps.upload.outputs.wasm_hash }}
        run: |
          # Deploy a fresh instance; use `contract restore` + `contract invoke upgrade`
          # for upgrades. For simplicity we deploy a new instance on each run.
          CONTRACT_ID=$(stellar contract deploy \
            --wasm-hash "$WASM_HASH" \
            --source deployer \
            --network testnet)
          echo "contract_id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Contract deployed at: $CONTRACT_ID"

      - name: Save deployment summary
        run: |
          echo "### 🚀 Testnet Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Network | Testnet |" >> "$GITHUB_STEP_SUMMARY"
          echo "| WASM Hash | ${{ steps.upload.outputs.wasm_hash }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Contract ID | ${{ steps.deploy.outputs.contract_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"


